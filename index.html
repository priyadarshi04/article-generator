<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Article Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0e0c;
      --paper: #f5f0e8;
      --cream: #ede7d9;
      --rust: #c0432a;
      --muted: #7a7060;
      --border: #d4c9b0;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    header {
      border-bottom: 3px double var(--ink);
      padding: 1.5rem 2rem 1rem;
      text-align: center;
      background: var(--paper);
    }

    header::before {
      content: '✦ POWERED BY n8n + OPENAI ✦';
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      display: block;
      margin-bottom: 0.5rem;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.02em;
    }

    header p {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-top: 0.6rem;
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
    }

    .dateline {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-align: center;
      padding: 0.4rem;
      border-bottom: 1px solid var(--border);
      background: var(--cream);
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .input-wrap {
      display: flex;
      border: 1px solid var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      background: white;
      margin-bottom: 1.5rem;
    }

    #topicInput {
      flex: 1;
      border: none;
      outline: none;
      padding: 1rem 1.25rem;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--ink);
      background: transparent;
    }

    #topicInput::placeholder { color: var(--muted); opacity: 0.7; }

    #generateBtn {
      border: none;
      border-left: 1px solid var(--ink);
      background: var(--ink);
      color: var(--paper);
      padding: 0 1.75rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #generateBtn:hover:not(:disabled) { background: var(--rust); }
    #generateBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .pill {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      background: transparent;
      transition: all 0.15s;
    }
    .pill:hover { border-color: var(--ink); color: var(--ink); background: var(--cream); }

    #loading {
      display: none;
      text-align: center;
      padding: 3rem 0;
      border-top: 3px double var(--ink);
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-bottom: 1rem;
    }

    .dot {
      width: 6px; height: 6px;
      background: var(--ink);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scaleY(1); opacity: 0.3; }
      40% { transform: scaleY(2.5); opacity: 1; }
    }

    .loading-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      animation: fade 1.5s ease-in-out infinite;
    }

    @keyframes fade { 0%,100%{opacity:0.4} 50%{opacity:1} }

    #error {
      display: none;
      border: 1px solid var(--rust);
      padding: 1rem 1.25rem;
      background: #fff5f3;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--rust);
      margin-bottom: 1.5rem;
    }

    #output {
      display: none;
      border-top: 3px double var(--ink);
      padding-top: 1.5rem;
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .kicker {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--rust);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    #articleHeadline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
    }

    .byline {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1.5rem;
    }

    #articleBody {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      line-height: 1.85;
      color: var(--ink);
    }

    #articleBody p {
      margin-bottom: 1.2em;
      text-align: justify;
    }

    #articleBody p:first-child::first-letter {
      font-family: 'Playfair Display', serif;
      font-size: 3.5em;
      font-weight: 900;
      float: left;
      line-height: 0.75;
      margin: 0.05em 0.08em 0 0;
      color: var(--rust);
    }

    .article-footer {
      margin-top: 2rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    #wordCount {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    #copyBtn {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid var(--ink);
      background: transparent;
      padding: 0.4rem 1rem;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--ink);
    }
    #copyBtn:hover { background: var(--ink); color: var(--paper); }

    .ornament {
      text-align: center;
      color: var(--muted);
      font-size: 1.2rem;
      margin: 2rem 0;
      letter-spacing: 0.5em;
    }
  </style>
</head>
<body>

<header>
  <h1>The Daily<br/>Compositor</h1>
  <p>AI Article Generator · n8n + OpenAI · Enter any topic below</p>
</header>

<div class="dateline" id="dateline"></div>

<main>
  <div class="label">Commission an Article</div>

  <div class="input-wrap">
    <input id="topicInput" type="text" placeholder="Enter any topic — science, history, technology, culture…" />
    <button id="generateBtn" onclick="generate()">Publish →</button>
  </div>

  <div class="pills">
    <button class="pill" onclick="quickGen('The future of quantum computing')">The future of quantum computing</button>
    <button class="pill" onclick="quickGen('Why deep sleep is critical for memory')">Why deep sleep is critical for memory</button>
    <button class="pill" onclick="quickGen('The economics of vertical farming')">The economics of vertical farming</button>
    <button class="pill" onclick="quickGen('The psychology of procrastination')">The psychology of procrastination</button>
    <button class="pill" onclick="quickGen('Climate change solutions in 2025')">Climate change solutions in 2025</button>
  </div>

  <div id="error"></div>

  <div id="loading">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="loading-text">TYPESETTING YOUR ARTICLE…</div>
  </div>

  <div id="output">
    <div class="kicker" id="kicker">Feature</div>
    <h2 id="articleHeadline"></h2>
    <div class="byline">
      <span>By OpenAI GPT-3.5</span>
      <span id="bylineDate"></span>
      <span>~500 words</span>
    </div>
    <div id="articleBody"></div>
    <div class="article-footer">
      <span id="wordCount"></span>
      <button id="copyBtn" onclick="copyArticle()">Copy Article</button>
    </div>
  </div>

  <div class="ornament" id="ornament">— ✦ —</div>
</main>

<script>
  const WEBHOOK = 'https://priyadarshirajeev.app.n8n.cloud/webhook/generate-article';

  // Set date
  const now = new Date();
  document.getElementById('dateline').textContent = now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' }) + ' · AI Edition';
  document.getElementById('bylineDate').textContent = now.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });

  document.getElementById('topicInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generate();
  });

  function quickGen(topic) {
    document.getElementById('topicInput').value = topic;
    generate();
  }

  async function generate() {
    const topic = document.getElementById('topicInput').value.trim();
    if (!topic) return;

    // UI state
    document.getElementById('generateBtn').disabled = true;
    document.getElementById('generateBtn').textContent = 'Writing…';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('output').style.display = 'none';
    document.getElementById('error').style.display = 'none';
    document.getElementById('ornament').style.display = 'none';

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic })
      });

      if (!res.ok) throw new Error('Workflow error: ' + res.status);

      const text = await res.text();
      if (!text || text.trim().length < 50) throw new Error('Empty response from workflow');

      renderArticle(topic, text.trim());

    } catch (err) {
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = '⚠ ' + err.message;
      document.getElementById('ornament').style.display = 'block';
    } finally {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('generateBtn').disabled = false;
      document.getElementById('generateBtn').textContent = 'Publish →';
    }
  }

  function renderArticle(topic, raw) {
    const lines = raw.split('\n').filter(l => l.trim());
    let headline = topic;
    let bodyLines = lines;

    // Extract headline if first line is short
    if (lines.length > 1 && lines[0].replace(/[#*]/g,'').trim().split(' ').length <= 15) {
      headline = lines[0].replace(/^#+\s*/, '').replace(/\*\*/g,'').trim();
      bodyLines = lines.slice(1);
    }

    // Split into paragraphs
    const paragraphs = raw.split(/\n{2,}/)
      .map(p => p.replace(/\n/g,' ').replace(/\*\*/g,'').replace(/^#+\s*/,'').trim())
      .filter(p => p.length > 30);

    // Remove headline from first paragraph if repeated
    const finalParas = paragraphs.filter(p => p !== headline);

    document.getElementById('kicker').textContent = 'Feature · ' + topic;
    document.getElementById('articleHeadline').textContent = headline;
    document.getElementById('articleBody').innerHTML = finalParas.map(p => `<p>${p}</p>`).join('');

    const wordCount = finalParas.join(' ').split(/\s+/).filter(Boolean).length;
    document.getElementById('wordCount').textContent = wordCount.toLocaleString() + ' words · Generated via n8n + OpenAI';

    document.getElementById('output').style.display = 'block';
    document.getElementById('output').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyArticle() {
    const headline = document.getElementById('articleHeadline').textContent;
    const body = document.getElementById('articleBody').innerText;
    navigator.clipboard.writeText(headline + '\n\n' + body).then(() => {
      document.getElementById('copyBtn').textContent = '✓ Copied!';
      setTimeout(() => document.getElementById('copyBtn').textContent = 'Copy Article', 2000);
    });
  }
</script>
</body>
</html>
